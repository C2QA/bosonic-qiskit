# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
    push:
        branches: ["**"]

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        steps:
            - uses: actions/checkout@v4

            - name: Install the latest version of uv
              uses: astral-sh/setup-uv@v7
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install Python dependencies for python ${{ matrix.python-version }}
              run: |
                  uv sync -p ${{ matrix.python-version }} --all-groups

            - name: Lint with flake8
              run: |
                  # stop the build if there are Python syntax errors or undefined names
                  uv run flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
                  # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
                  uv run flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

            - name: Test with pytest
              run: |
                  uv run pytest -s
